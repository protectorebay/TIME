<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Earthquake Scroll Ticker</title>

<style>
body {
    margin: 0;
    background: transparent;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* VIEWPORT (OBS si oreže šírku) */
#viewport {
    width: 100%;
    height: 70px;
    overflow: hidden;
    background: rgba(0,0,0,0.75);
}

/* TRACK ktorý sa hýbe */
#track {
    display: flex;
    width: max-content;
    animation: scroll 40s linear infinite;
}

/* BOX */
.box {
    display: flex;
    align-items: center;
    padding: 5px 20px;
    color: white;
    border-right: 1px solid rgba(255,255,255,0.15);
    min-width: 320px;
}

/* MAG */
.mag {
    font-size: 40px;
    font-weight: bold;
    margin-right: 15px;
    min-width: 65px;
}

/* INFO */
.info {
    flex: 1;
    overflow: hidden;
}

.loc {
    font-size: 16px;
    font-weight: bold;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.depth {
    font-size: 14px;
    opacity: 0.85;
}

/* TIME */
.time {
    background: rgba(255,255,255,0.9);
    color: black;
    padding: 5px 10px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: bold;
    margin-left: 10px;
    white-space: nowrap;
}

/* ANIMÁCIA */
@keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
}

</style>
</head>

<body>

<div id="viewport">
    <div id="track"></div>
</div>

<script>

let earthquakes = [];

/* čas */
function getTimeAgo(timestamp) {
    const now = Date.now();
    const diff = Math.floor((now - timestamp) / 60000);

    if (diff < 1) return "Just now";
    if (diff === 1) return "1 min ago";
    return diff + " min ago";
}

/* fetch */
async function fetchData() {
    try {
        const res = await fetch("https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_hour.geojson");
        const data = await res.json();

        earthquakes = data.features
            .sort((a, b) => b.properties.time - a.properties.time)
            .slice(0, 6)
            .map(eq => ({
                mag: eq.properties.mag ? eq.properties.mag.toFixed(1) : "0.0",
                place: eq.properties.place,
                depth: eq.geometry.coordinates[2].toFixed(1),
                time: eq.properties.time
            }));

        render();

    } catch (e) {
        console.error(e);
    }
}

/* render + DUPLIKÁCIA kvôli loopu */
function render() {
    const track = document.getElementById("track");
    track.innerHTML = "";

    let content = "";

    earthquakes.forEach(eq => {
        content += `
        <div class="box">
            <div class="mag">${eq.mag}</div>
            <div class="info">
                <div class="loc">${eq.place}</div>
                <div class="depth">Depth: ${eq.depth} km</div>
            </div>
            <div class="time" data-time="${eq.time}">
                ${getTimeAgo(eq.time)}
            </div>
        </div>`;
    });

    // DUPLIKÁCIA → seamless scroll
    track.innerHTML = content + content;
}

/* update časov */
function updateTimes() {
    document.querySelectorAll(".time").forEach(el => {
        const t = parseInt(el.getAttribute("data-time"));
        el.textContent = getTimeAgo(t);
    });
}

/* init */
fetchData();
setInterval(fetchData, 60000);
setInterval(updateTimes, 60000);

</script>

</body>
</html>
