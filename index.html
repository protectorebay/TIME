<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>World Clock Widget</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #0b0b0b;
    font-family: 'Montserrat', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* container */
.wrapper {
    display: flex;
    gap: 14px;
}

/* card */
.card {
    background: #2a2a2a;
    padding: 16px 26px;
    text-align: center;
    border-radius: 4px;
    min-width: 150px;
}

/* city */
.city {
    font-size: 22px;
    font-weight: 800;
    color: #f0f0f0;
    margin-bottom: 4px;
    letter-spacing: 0.3px;
}

/* time */
.time {
    font-size: 26px;
    font-weight: 700;
    color: #ffffff;
}
</style>
</head>

<body>

<div class="wrapper">
    <div class="card"><div class="city">Los Angeles</div><div class="time" id="la"></div></div>
    <div class="card"><div class="city">New York</div><div class="time" id="ny"></div></div>
    <div class="card"><div class="city">London</div><div class="time" id="lon"></div></div>
    <div class="card"><div class="city">Paris</div><div class="time" id="par"></div></div>
    <div class="card"><div class="city">Beijing</div><div class="time" id="bei"></div></div>
    <div class="card"><div class="city">Tokyo</div><div class="time" id="tok"></div></div>
</div>

<script>
function updateClocks() {
    const options = { hour: '2-digit', minute: '2-digit', hour12: false };

    document.getElementById('la').innerText =
        new Date().toLocaleTimeString('en-US', { ...options, timeZone: 'America/Los_Angeles' });

    document.getElementById('ny').innerText =
        new Date().toLocaleTimeString('en-US', { ...options, timeZone: 'America/New_York' });

    document.getElementById('lon').innerText =
        new Date().toLocaleTimeString('en-GB', { ...options, timeZone: 'Europe/London' });

    document.getElementById('par').innerText =
        new Date().toLocaleTimeString('fr-FR', { ...options, timeZone: 'Europe/Paris' });

    document.getElementById('bei').innerText =
        new Date().toLocaleTimeString('zh-CN', { ...options, timeZone: 'Asia/Shanghai' });

    document.getElementById('tok').innerText =
        new Date().toLocaleTimeString('ja-JP', { ...options, timeZone: 'Asia/Tokyo' });
}

updateClocks();
setInterval(updateClocks, 1000);
</script>

</body>
</html>
